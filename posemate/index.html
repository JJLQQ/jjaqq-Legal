<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoseMate - Official Website</title>
    <style>
        /* 1. 全局极简背景风格 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            line-height: 1.6; 
            color: #333333; 
            max-width: 650px; 
            margin: 0 auto; 
            padding: 50px 24px; 
            background-color: #fcf9f9; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* 2. 主白底卡片 */
        .container { 
            background: #ffffff; 
            padding: 45px 35px; 
            border-radius: 28px; 
            box-shadow: 0 8px 32px rgba(240, 220, 220, 0.3); 
            text-align: center;
        }

        /* 3. 品牌区域布局 */
        .brand-header {
            margin-bottom: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* App 图标：完美对齐你的 iOS 原生圆角与外发光 */
        .app-main-icon { 
            width: 110px; 
            height: 110px; 
            border-radius: 24px; 
            object-fit: cover;
            box-shadow: 0 10px 28px rgba(255, 182, 193, 0.45); 
            margin-bottom: 20px;
        }
        
        /* 文字包裹层（用于定位右上角的闪烁小星星） */
        .title-wrapper {
            position: relative;
            display: inline-block;
            padding-right: 20px; /* 为右上角的小星星留出空间 */
        }

        /* 像素级复刻你的蓝紫粉渐变字体 */
        .app-title { 
            font-size: 38px; 
            font-weight: 800; /* 极致粗体 */
            margin: 0 0 5px 0; 
            letter-spacing: -0.8px; /* 紧凑设计字距 */
            
            /* 渐变色实现核心代码 */
            background: linear-gradient(to right, #DE4793 0%, #B852BA 40%, #8767E6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        /* 纯 CSS 复刻右上角的粉色璀璨四角星 */
        .title-wrapper::after {
            content: "✦";
            position: absolute;
            top: -2px;
            right: -2px;
            font-size: 22px;
            color: #E24C96; /* 闪烁星的原生粉色 */
            font-weight: normal;
            -webkit-text-fill-color: #E24C96; /* 确保不受文字渐变透明的影响 */
        }
        
        /* 描述文字样式 */
        .app-tagline {
            color: #757575; /* 优雅中灰 */
            font-size: 15px;
            font-weight: 500;
            margin: 0;
            letter-spacing: -0.1px;
        }
        
        /* 4. 分块小标题 */
        .section-title { 
            font-size: 12px; 
            font-weight: 700; 
            color: #c4b5b5; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 45px; 
            margin-bottom: 15px; 
        }
        
        /* 5. 协议板块卡片 */
        .legal-card { 
            padding: 24px; 
            border: 1px solid #f9f6f6; 
            border-radius: 20px; 
            background-color: #fafafa; 
            margin-bottom: 25px; 
        }
        .links { 
            display: flex; 
            justify-content: center;
            gap: 40px; 
        }
        .links a { 
            color: #ff69b4; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 700; 
            transition: opacity 0.2s;
        }
        .links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }
        
        /* 6. 联系我们 */
        .contact-box { 
            background: #fafafa; 
            padding: 22px; 
            border-radius: 20px; 
            border: 1px solid #f9f6f6; 
            font-size: 14px; 
            color: #555555;
        }
        .contact-box a {
            color: #000000;
            text-decoration: none;
            font-weight: 700;
        }
        .contact-box a:hover {
            text-decoration: underline;
        }
        
        /* 7. 页脚版权区 */
        .studio-footer { 
            text-align: center; 
            margin-top: 55px; 
            font-size: 11px; 
            color: #ccc0c0; 
            border-top: 1px solid #fcf3f3;
            padding-top: 25px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="brand-header">
        <img src="posemate_icon_1024.png" class="app-main-icon" alt="PoseMate Icon">
        
        <div class="title-wrapper">
            <h1 class="app-title">PoseMate</h1>
        </div>
        
        <p class="app-tagline">Copy Any Photo & Master Your Poses</p>
    </div>

    <div class="section-title">Legal Documents / 法务条款</div>
    <div class="legal-card">
        <div class="links">
            <a href="privacy.html">Privacy Policy / 隐私政策</a>
            <a href="terms.html">Terms of Service / 服务条款</a>
        </div>
    </div>

    <div class="section-title">Support & Contact / 联系我们</div>
    <div class="contact-box">
        If you have any questions, please email us at:<br>
        <strong><a href="mailto:yokonoayako1@gmail.com">yokonoayako1@gmail.com</a></strong>
    </div>

</div>

<div class="studio-footer">
    <strong>JJAQQ Studio</strong><br>
    &copy; 2026 All rights reserved.
</div>
</body>
</html>
